<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapeo — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D0C0A; --ink-soft: #1C1A16; --ink-card: #141210;
    --cream: #F5F0E8; --cream-muted: rgba(245,240,232,0.55);
    --stone: #B8956A; --stone-light: #D4B896;
    --terra: #C4674A;
    --border: rgba(245,240,232,0.08); --border-mid: rgba(245,240,232,0.14);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--ink);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: 100%;
    max-width: 380px;
    padding: 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .logo p {
    font-size: 0.72rem;
    color: var(--cream-muted);
    margin-top: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .card {
    background: var(--ink-card);
    border: 1px solid var(--border-mid);
    border-radius: 12px;
    padding: 32px 28px;
  }
  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card .sub {
    font-size: 0.78rem;
    color: var(--cream-muted);
    margin-bottom: 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--cream-muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--ink);
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--stone);
  }
  .form-group input::placeholder {
    color: rgba(245,240,232,0.25);
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--stone);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .btn:hover { background: var(--stone-light); }
  .error {
    color: var(--terra);
    font-size: 0.78rem;
    margin-top: 10px;
    display: none;
    text-align: center;
  }
  .back {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 0.78rem;
    color: var(--cream-muted);
    transition: color 0.2s;
  }
  .back:hover { color: var(--cream); }
  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Tapeo</h1>
      <p>Verified local traffic</p>
    </div>
    <div class="card">
      <h2>Sign in</h2>
      <p class="sub">Access your dashboard</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@tapeo.co" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
      <div class="error" id="error">Invalid email or password</div>
    </div>
    <a href="/" class="back">← Back to Tapeo</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        // Redirect based on role
        window.location.href = result.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } catch (err) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message || 'Invalid email or password';
      }
    });
  </script>
</body>
</html>
